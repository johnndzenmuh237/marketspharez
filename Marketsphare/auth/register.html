<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Marketsphare</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-panel">
      <div class="auth-box">
        <a href="../index.html" class="logo mb-3"><span class="logo-mark">MS</span><span class="brand-text">Marketsphare</span></a>
        <h2 style="font-size:26px;margin:18px 0 6px;">Create your account</h2>
        <p class="text-secondary mb-3">Join the marketplace in less than a minute.</p>

        <div class="role-toggle">
          <button type="button" class="active" data-role="worker">I'm a Worker</button>
          <button type="button" data-role="employer">I'm an Employer</button>
        </div>
        <input type="hidden" id="selectedRole" value="worker">

        <div class="social-auth mb-3">
          <button class="btn btn-outline" type="button"><svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.26 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0012 23z"/><path fill="#FBBC05" d="M5.84 14.1A6.6 6.6 0 015.5 12c0-.73.13-1.43.34-2.1V7.06H2.18A11 11 0 001 12c0 1.77.42 3.45 1.18 4.94l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 002.18 7.06l3.66 2.84C6.71 7.3 9.14 5.38 12 5.38z"/></svg> Google</button>
          <button class="btn btn-outline" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="#000"><path d="M16.36 1.4c.1 1-.27 1.96-.86 2.66-.6.7-1.6 1.25-2.55 1.17-.13-.97.3-1.98.86-2.62.61-.69 1.66-1.2 2.55-1.2zM20.6 17.1c-.46 1.05-.68 1.5-1.27 2.43-.83 1.3-2 2.92-3.44 2.94-1.29.02-1.62-.83-3.37-.82-1.74 0-2.1.8-3.39.84-1.45.04-2.55-1.43-3.38-2.72-2.3-3.55-2.55-7.72-1.13-9.94.9-1.43 2.43-2.39 4-2.41 1.36-.02 2.64.92 3.46.92.82 0 2.38-1.13 4.01-.97.68.03 2.59.27 3.83 2.06-.1.06-2.28 1.34-2.26 3.99.02 3.18 2.79 4.24 2.94 4.68z"/></svg> Apple</button>
        </div>
        <div class="form-divider">or continue with email</div>

        <form id="registerForm" novalidate>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="fullName" class="form-control" placeholder="Jane Doe" required>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="you@email.com" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Password</label>
              <div class="input-icon-wrap">
                <input type="password" name="password" class="form-control" placeholder="••••••••" required minlength="8">
                <button type="button" class="toggle-pass">👁️</button>
              </div>
            </div>
            <div class="form-group">
              <label>Confirm Password</label>
              <div class="input-icon-wrap">
                <input type="password" name="confirmPassword" class="form-control" placeholder="••••••••" required minlength="8">
                <button type="button" class="toggle-pass">👁️</button>
              </div>
            </div>
          </div>
          <label class="checkbox-row mb-3"><input type="checkbox" name="terms" required> I agree to the <a href="#" style="color:var(--color-primary);">Terms of Service</a> &amp; Privacy Policy</label>
          <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>

        <p class="text-center mt-3" style="font-size:14px;">Already have an account? <a href="login.html" style="color:var(--color-primary);font-weight:600;">Log in</a></p>
      </div>
    </div>
    <div class="auth-side">
      <div class="auth-side-content">
        <h2>Start hiring or get hired in minutes.</h2>
        <p>AI matching and verified profiles — built for digital marketing professionals.</p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/user-profile.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/auth.js"></script>
</body>
</html>
